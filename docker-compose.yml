services:
  postgres:
    image: postgres:16-alpine
    container_name: party-jam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: partyjam
      POSTGRES_PASSWORD: partyjam_dev
      POSTGRES_DB: partyjam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
